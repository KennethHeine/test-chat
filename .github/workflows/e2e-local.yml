name: E2E Tests (Local)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  pull_request_target:
    types: [labeled]
    branches: [main, 'stage-*/**']

permissions:
  contents: read

jobs:
  e2e-local:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'run-e2e' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against local server
        run: npx playwright test --project=local
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          BASE_URL: http://localhost:3000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-local
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # Separate job with write permissions for label cleanup (only for label-triggered runs)
  cleanup-label:
    if: always() && github.event_name == 'pull_request_target' && github.event.action == 'labeled'
    needs: e2e-local
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove run-e2e label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'run-e2e',
              });
            } catch (e) {
              // Label may already be removed
            }
