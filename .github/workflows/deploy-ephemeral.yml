name: Deploy Ephemeral Environment

on:
  pull_request:
    types: [closed]
    branches: [main, 'stage-*/**']
  pull_request_target:
    types: [labeled]
    branches: [main, 'stage-*/**']

permissions:
  id-token: write
  contents: read
  packages: write
  pull-requests: write

env:
  RESOURCE_GROUP: rg-test-chat
  APP_NAME: test-chat

jobs:
  # ── Deploy ephemeral environment ──────────────────────────────────
  deploy:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'deploy-ephemeral' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      ephemeral-url: ${{ steps.deploy.outputs.ephemeralAppUrl }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:pr-${{ github.event.pull_request.number }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ephemeral infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/ephemeral.bicep
          parameters: >-
            prNumber=${{ github.event.pull_request.number }}
            containerImage=ghcr.io/${{ env.REPO_LC }}:pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const url = '${{ steps.deploy.outputs.ephemeralAppUrl }}';
            const body = [
              '🚀 **Ephemeral environment deployed!**',
              '',
              `**Preview URL:** ${url}`,
              '',
              'This environment runs the same code as production (with in-memory storage instead of Azure Storage). It will be automatically destroyed when this PR is closed or merged.',
              '',
              '_Deployed from commit ${{ github.event.pull_request.head.sha }}_'
            ].join('\n');

            // Delete any previous bot comments for this workflow
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('Ephemeral environment deployed')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Remove deploy-ephemeral label
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'deploy-ephemeral',
              });
            } catch (e) {
              // Label may already be removed
            }

  # ── Tear down ephemeral environment ───────────────────────────────
  teardown:
    if: >
      github.event.action == 'closed' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete ephemeral Container App
        run: |
          APP_EXISTS=$(az containerapp show \
            --name "${{ env.APP_NAME }}-pr-${{ github.event.pull_request.number }}-api" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "name" -o tsv 2>/dev/null || true)

          if [ -n "$APP_EXISTS" ]; then
            az containerapp delete \
              --name "${{ env.APP_NAME }}-pr-${{ github.event.pull_request.number }}-api" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --yes
            echo "Deleted ephemeral app: ${{ env.APP_NAME }}-pr-${{ github.event.pull_request.number }}-api"
          else
            echo "No ephemeral app found — nothing to delete"
          fi

      - name: Comment teardown notice on PR
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '♻️ **Ephemeral environment destroyed.** The preview environment for this PR has been cleaned up.',
            });

  # ── E2E tests against ephemeral environment ───────────────────────
  e2e-ephemeral:
    needs: deploy
    if: needs.deploy.outputs.ephemeral-url != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for ephemeral app to be ready
        run: |
          URL="${{ needs.deploy.outputs.ephemeral-url }}/api/health"
          echo "Waiting for $URL to respond..."
          for i in $(seq 1 30); do
            if curl -sf "$URL" > /dev/null 2>&1; then
              echo "Ephemeral app is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Ephemeral app did not become ready in time"
          exit 1

      - name: Run E2E tests against ephemeral environment
        run: npx playwright test --project=ephemeral
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          EPHEMERAL_URL: ${{ needs.deploy.outputs.ephemeral-url }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ephemeral
          path: |
            test-results/
            playwright-report/
          retention-days: 7
