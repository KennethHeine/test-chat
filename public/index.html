<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Agent Orchestrator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #0d1117;
      --color-bg-secondary: #161b22;
      --color-bg-tertiary: #21262d;
      --color-border: #30363d;
      --color-text: #e6edf3;
      --color-text-muted: #8b949e;
      --color-accent: #58a6ff;
      --color-accent-emphasis: #1f6feb;
      --color-success: #3fb950;
      --color-danger: #f85149;
      --color-user-bubble: #1f6feb;
      --color-assistant-bubble: #161b22;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      --radius: 6px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
    }

    header .logo svg {
      width: 24px;
      height: 24px;
      fill: var(--color-text);
    }

    header .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select, button {
      font-family: var(--font-sans);
      font-size: 14px;
      border-radius: var(--radius);
      cursor: pointer;
    }

    select {
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 8px;
      outline: none;
    }

    select:hover { border-color: var(--color-text-muted); }
    select:focus { border-color: var(--color-accent); box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.3); }

    #token-input {
      width: 260px;
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 5px 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
    }

    .btn {
      padding: 5px 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--color-border); }

    .btn-primary {
      background: var(--color-accent-emphasis);
      border-color: var(--color-accent-emphasis);
      color: #fff;
    }

    .btn-primary:hover { background: #388bfd; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    .btn-danger {
      background: var(--color-danger);
      border-color: var(--color-danger);
      color: #fff;
      padding: 5px 12px;
      font-weight: 500;
    }

    .btn-danger:hover { background: #da3633; }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #messages::-webkit-scrollbar { width: 8px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: var(--color-user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--color-assistant-bubble);
      border: 1px solid var(--color-border);
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: center;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--color-danger);
      color: var(--color-danger);
      font-size: 13px;
    }

    .message .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      color: var(--color-text-muted);
    }

    .message.user .label { color: rgba(255,255,255,0.7); }

    .typing-indicator::after {
      content: '▊';
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Input area */
    #input-area {
      padding: 12px 16px;
      background: var(--color-bg-secondary);
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 200px;
      line-height: 1.4;
    }

    #input-area textarea::placeholder { color: var(--color-text-muted); }
    #input-area textarea:focus { border-color: var(--color-accent); box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.3); }

    /* Status bar */
    #status-bar {
      padding: 4px 16px;
      background: var(--color-bg-secondary);
      border-top: 1px solid var(--color-border);
      font-size: 12px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-success);
    }

    .status-dot.disconnected { background: var(--color-danger); }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--color-text-muted);
      gap: 12px;
    }

    .welcome svg { width: 48px; height: 48px; fill: var(--color-text-muted); }
    .welcome h2 { font-size: 20px; color: var(--color-text); font-weight: 600; }
    .welcome p { font-size: 14px; }

    /* Main layout with sidebar */
    #app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Session sidebar */
    #session-sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--color-bg-secondary);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #session-sidebar.collapsed {
      display: none;
    }

    #session-sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #session-sidebar-header h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-muted);
      margin: 0;
    }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    #session-list::-webkit-scrollbar { width: 6px; }
    #session-list::-webkit-scrollbar-track { background: transparent; }
    #session-list::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }

    .session-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      color: var(--color-text);
      transition: background 0.15s;
      position: relative;
    }

    .session-item:hover {
      background: var(--color-bg-tertiary);
    }

    .session-item.active {
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
    }

    .session-item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-item-meta {
      font-size: 11px;
      color: var(--color-text-muted);
    }

    .session-item-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 14px;
      border-radius: 3px;
      line-height: 1;
      flex-shrink: 0;
    }

    .session-item:hover .session-item-delete {
      opacity: 1;
    }

    .session-item-delete:hover {
      color: var(--color-danger);
      background: rgba(248, 81, 73, 0.15);
    }

    .session-empty {
      padding: 16px;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 13px;
    }

    /* Chat area (right side of sidebar) */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .btn-icon {
      padding: 4px 8px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      cursor: pointer;
      border-radius: var(--radius);
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover { background: var(--color-border); }

    #toggle-sidebar-btn {
      font-size: 18px;
    }

    /* Mobile sidebar overlay backdrop */
    #sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
    }

    /* ===== Responsive: Tablets & small desktops ===== */
    @media (max-width: 768px) {
      /* Header: wrap controls */
      header {
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 12px;
      }

      header .logo {
        font-size: 14px;
        flex: 1;
        min-width: 0;
      }

      header .controls {
        flex-wrap: wrap;
        gap: 6px;
        width: 100%;
        order: 1;
      }

      /* Token input: fill available space */
      #token-input {
        width: auto;
        flex: 1;
        min-width: 120px;
      }

      /* Model select: fill remaining space */
      #model-select {
        flex: 1;
        min-width: 100px;
      }

      /* Sidebar: overlay on mobile */
      #session-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
        width: 280px;
        min-width: 280px;
        transform: translateX(0);
        transition: transform 0.2s ease;
      }

      #session-sidebar.collapsed {
        display: flex;
        transform: translateX(-100%);
      }

      /* Message bubbles wider on mobile */
      .message {
        max-width: 92%;
      }

      #messages {
        padding: 12px;
      }

      #input-area {
        padding: 8px 12px;
      }
    }

    /* ===== Responsive: Phones ===== */
    @media (max-width: 480px) {
      header {
        padding: 8px 10px;
      }

      header .logo span {
        display: none;
      }

      header .controls {
        gap: 4px;
      }

      #token-input {
        min-width: 80px;
        font-size: 12px;
        padding: 4px 6px;
      }

      select, .btn {
        font-size: 12px;
        padding: 4px 8px;
      }

      .message {
        max-width: 96%;
        font-size: 13px;
        padding: 8px 10px;
      }

      #messages {
        padding: 8px;
        gap: 8px;
      }

      #input-area textarea {
        font-size: 16px; /* Prevent iOS zoom on focus */
      }

      .welcome h2 {
        font-size: 16px;
      }

      .welcome p {
        font-size: 12px;
        padding: 0 16px;
        text-align: center;
      }

      #status-bar {
        padding: 4px 10px;
        font-size: 11px;
        flex-wrap: wrap;
      }
    }
    /* Goal Summary Card */
    .goal-card {
      align-self: flex-start;
      max-width: 80%;
      border: 1px solid var(--color-accent);
      border-radius: 10px;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .goal-card-header {
      background: var(--color-accent-emphasis);
      color: #fff;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .goal-card-body {
      background: var(--color-assistant-bubble);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .goal-card-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .goal-card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-muted);
    }

    .goal-card-value {
      color: var(--color-text);
    }

    .goal-card-list-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .goal-card-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .goal-card-list li {
      color: var(--color-success);
      padding-left: 4px;
    }

    .goal-card-counts {
      font-size: 12px;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      padding-top: 8px;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      .goal-card {
        max-width: 92%;
      }
    }

    @media (max-width: 480px) {
      .goal-card {
        max-width: 96%;
        font-size: 13px;
      }
    }

    /* Research Checklist Card */
    .research-card {
      align-self: flex-start;
      max-width: 80%;
      border: 1px solid var(--color-accent);
      border-radius: 10px;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .research-card-header {
      background: var(--color-accent-emphasis);
      color: #fff;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .research-card-body {
      background: var(--color-assistant-bubble);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .research-category-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .research-category-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-muted);
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
    }

    .research-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 0;
    }

    .research-item-status {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .research-item-status.status-open {
      background: var(--color-bg-tertiary);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }

    .research-item-status.status-researching {
      background: rgba(88, 166, 255, 0.15);
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
    }

    .research-item-status.status-resolved {
      background: rgba(63, 185, 80, 0.15);
      color: var(--color-success);
      border: 1px solid var(--color-success);
    }

    .research-item-question {
      color: var(--color-text);
      flex: 1;
    }

    .research-card-summary {
      font-size: 12px;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      padding-top: 8px;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      .research-card {
        max-width: 92%;
      }
    }

    @media (max-width: 480px) {
      .research-card {
        max-width: 96%;
        font-size: 13px;
      }
    }

    /* Milestone Timeline Card */
    .milestone-card {
      align-self: flex-start;
      max-width: 80%;
      border: 1px solid var(--color-accent);
      border-radius: 10px;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .milestone-card-header {
      background: var(--color-accent-emphasis);
      color: #fff;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .milestone-card-body {
      background: var(--color-assistant-bubble);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .milestone-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
      background: var(--color-bg-tertiary);
    }

    .milestone-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .milestone-order {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--color-text-muted);
      min-width: 24px;
    }

    .milestone-name {
      font-weight: 600;
      color: var(--color-text);
      flex: 1;
    }

    .milestone-status {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .milestone-status.status-draft {
      background: var(--color-bg-tertiary);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }

    .milestone-status.status-ready {
      background: rgba(88, 166, 255, 0.15);
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
    }

    .milestone-status.status-in-progress {
      background: rgba(210, 153, 34, 0.15);
      color: #d29922;
      border: 1px solid #d29922;
    }

    .milestone-status.status-complete {
      background: rgba(63, 185, 80, 0.15);
      color: var(--color-success);
      border: 1px solid var(--color-success);
    }

    .milestone-goal {
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .milestone-deps {
      font-size: 12px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .milestone-deps-label {
      font-weight: 600;
    }

    .milestone-card-summary {
      font-size: 12px;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      padding-top: 8px;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      .milestone-card {
        max-width: 92%;
      }
    }

    @media (max-width: 480px) {
      .milestone-card {
        max-width: 96%;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
      </svg>
      <span>Copilot Agent Orchestrator</span>
    </div>
    <div class="controls">
      <button class="btn-icon" id="toggle-sidebar-btn" title="Toggle sessions sidebar" aria-label="Toggle sessions sidebar">☰</button>
      <input type="password" id="token-input" placeholder="GitHub token (ghp_... or github_pat_...)" spellcheck="false" autocomplete="off" />
      <button class="btn" id="save-token-btn" title="Save token to browser">Save Token</button>
      <select id="model-select" title="Select model">
        <option value="gpt-4.1">Enter token to load models</option>
      </select>
      <select id="reasoning-effort-select" title="Reasoning effort" style="display:none">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="xhigh">Extended</option>
      </select>
      <button class="btn" id="new-chat-btn" title="Start a new conversation">New Chat</button>
    </div>
  </header>

  <div id="app-body">
    <div id="sidebar-backdrop"></div>
    <div id="session-sidebar">
      <div id="session-sidebar-header">
        <h3>Sessions</h3>
      </div>
      <div id="session-list">
        <div class="session-empty">No sessions yet.<br>Start a conversation!</div>
      </div>
    </div>

    <div id="chat-area">
      <div id="messages">
        <div class="welcome" id="welcome">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
          </svg>
          <h2>Copilot Agent Orchestrator</h2>
          <p>Research codebases, plan coding tasks, and orchestrate agents</p>
        </div>
      </div>

      <div id="input-area">
        <textarea id="message-input" placeholder="Ask Copilot to research a repo, plan tasks, or explore code..." rows="1"></textarea>
        <button class="btn btn-primary" id="send-btn">Send</button>
        <button class="btn btn-danger" id="stop-btn" style="display: none;" title="Stop the current response">Stop</button>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Checking connection...</span>
    <span id="tool-activity" style="display: none; margin-left: auto; color: var(--color-accent);">
      <span id="tool-activity-text"></span>
    </span>
    <span id="agent-status" style="display: none; margin-left: 8px; color: var(--color-text-muted); font-size: 11px;">
      <span id="agent-status-text"></span>
    </span>
    <span id="usage-display" style="display: none; margin-left: 12px; color: var(--color-text-muted); font-size: 11px;">
      <span id="usage-text"></span>
    </span>
    <span id="quota-display" style="display: none; margin-left: 12px; color: var(--color-text-muted); font-size: 11px;">
      <span id="quota-text"></span>
    </span>
  </div>

  <script src="app.js"></script>
</body>
</html>
