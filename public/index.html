<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #0d1117;
      --color-bg-secondary: #161b22;
      --color-bg-tertiary: #21262d;
      --color-border: #30363d;
      --color-text: #e6edf3;
      --color-text-muted: #8b949e;
      --color-accent: #58a6ff;
      --color-accent-emphasis: #1f6feb;
      --color-success: #3fb950;
      --color-danger: #f85149;
      --color-user-bubble: #1f6feb;
      --color-assistant-bubble: #161b22;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      --radius: 6px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
    }

    header .logo svg {
      width: 24px;
      height: 24px;
      fill: var(--color-text);
    }

    header .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select, button {
      font-family: var(--font-sans);
      font-size: 14px;
      border-radius: var(--radius);
      cursor: pointer;
    }

    select {
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 8px;
      outline: none;
    }

    select:hover { border-color: var(--color-text-muted); }
    select:focus { border-color: var(--color-accent); box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.3); }

    .btn {
      padding: 5px 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--color-border); }

    .btn-primary {
      background: var(--color-accent-emphasis);
      border-color: var(--color-accent-emphasis);
      color: #fff;
    }

    .btn-primary:hover { background: #388bfd; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #messages::-webkit-scrollbar { width: 8px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: var(--color-user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--color-assistant-bubble);
      border: 1px solid var(--color-border);
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: center;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--color-danger);
      color: var(--color-danger);
      font-size: 13px;
    }

    .message .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      color: var(--color-text-muted);
    }

    .message.user .label { color: rgba(255,255,255,0.7); }

    .typing-indicator::after {
      content: '▊';
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Input area */
    #input-area {
      padding: 12px 16px;
      background: var(--color-bg-secondary);
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      background: var(--color-bg-tertiary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 200px;
      line-height: 1.4;
    }

    #input-area textarea::placeholder { color: var(--color-text-muted); }
    #input-area textarea:focus { border-color: var(--color-accent); box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.3); }

    /* Status bar */
    #status-bar {
      padding: 4px 16px;
      background: var(--color-bg-secondary);
      border-top: 1px solid var(--color-border);
      font-size: 12px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-success);
    }

    .status-dot.disconnected { background: var(--color-danger); }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--color-text-muted);
      gap: 12px;
    }

    .welcome svg { width: 48px; height: 48px; fill: var(--color-text-muted); }
    .welcome h2 { font-size: 20px; color: var(--color-text); font-weight: 600; }
    .welcome p { font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
      </svg>
      Copilot Chat
    </div>
    <div class="controls">
      <select id="model-select" title="Select model">
        <option value="gpt-4.1">Loading models...</option>
      </select>
      <button class="btn" id="new-chat-btn" title="Start a new conversation">New Chat</button>
    </div>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
      </svg>
      <h2>GitHub Copilot Chat</h2>
      <p>Send a message to start a conversation</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="message-input" placeholder="Ask Copilot a question..." rows="1"></textarea>
    <button class="btn btn-primary" id="send-btn">Send</button>
  </div>

  <div id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Checking connection...</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
